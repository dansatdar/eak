<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e8c7ff">
<title>For Yolanda 💕</title>
<style>
  :root{
    --pink:#ffd6ec;
    --pink-deep:#ff9ecb;
    --purple:#e3d2ff;
    --purple-deep:#c9a4ff;
    --blue:#cdeaff;
    --blue-deep:#9fd3ff;
    --gold:#ffe9a8;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f3e6ff;
    font-family:sans-serif;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    background:linear-gradient(-45deg, var(--pink), var(--purple), var(--blue), var(--pink-deep));
    background-size:400% 400%;
    animation:gradientFlow 18s ease infinite;
    position:relative;
  }

  @keyframes gradientFlow{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* ---------- AURORA / GLOW BLOBS ---------- */
  .aurora{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
    filter:blur(70px);
    opacity:.65;
  }
  .aurora::before,
  .aurora::after{
    content:'';
    position:absolute;
    border-radius:50%;
    will-change:transform;
  }
  .aurora::before{
    width:55vmax; height:55vmax;
    top:-15%; left:-15%;
    background:radial-gradient(circle, var(--purple-deep), transparent 70%);
    animation:blobMove1 22s ease-in-out infinite;
  }
  .aurora::after{
    width:50vmax; height:50vmax;
    bottom:-18%; right:-12%;
    background:radial-gradient(circle, var(--blue-deep), transparent 70%);
    animation:blobMove2 26s ease-in-out infinite;
  }
  @keyframes blobMove1{0%,100%{transform:translate(0,0)}50%{transform:translate(8%,12%)}}
  @keyframes blobMove2{0%,100%{transform:translate(0,0)}50%{transform:translate(-10%,-8%)}}

  /* ---------- FLOWERS ---------- */
  .flowers-layer{
    position:fixed; inset:0;
    z-index:1;
    pointer-events:none;
    overflow:hidden;
  }

  .flower{
    position:absolute;
    width:var(--size);
    height:var(--size);
    top:var(--top);
    left:var(--left);
    opacity:var(--op, 1);
    animation:floatFlower 7s ease-in-out var(--delay) infinite;
    will-change:transform;
  }

  @keyframes floatFlower{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-14px) rotate(3deg); }
  }

  .petal{
    position:absolute;
    bottom:50%;
    left:50%;
    width:34%;
    height:52%;
    margin-left:-17%;
    border-radius:50%;
    transform-origin:50% 100%;
    background:linear-gradient(180deg, var(--c1), var(--c2));
    box-shadow:
      inset 0 -6px 10px rgba(255,255,255,.55),
      0 0 10px rgba(255,255,255,.25);
    transform:rotate(var(--angle)) scaleY(0);
    opacity:0;
    animation:bloomPetal .9s cubic-bezier(.34,1.56,.64,1) forwards;
    will-change:transform, opacity;
  }
  @keyframes bloomPetal{
    to{ transform:rotate(var(--angle)) scaleY(1); opacity:1; }
  }

  .flower-center{
    position:absolute;
    width:22%; height:22%;
    left:39%; top:39%;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff6d8, var(--gold) 60%, #ffd76b);
    box-shadow:0 0 14px rgba(255,221,128,.85);
    z-index:2;
    animation:centerPulse 3s ease-in-out infinite;
  }
  @keyframes centerPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.1); }
  }

  .mini-sparkle{
    position:absolute;
    width:7px; height:7px;
    background:#fff;
    border-radius:1px;
    transform:rotate(45deg) scale(0);
    box-shadow:0 0 8px 2px rgba(255,255,255,.85);
    animation:twinkle 2.6s ease-in-out infinite;
    z-index:3;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0; transform:rotate(45deg) scale(.2); }
    50%{ opacity:1; transform:rotate(45deg) scale(1); }
  }

  /* ---------- FLOATING HEARTS ---------- */
  .hearts-layer{
    position:fixed; inset:0;
    z-index:2;
    pointer-events:none;
    overflow:hidden;
  }
  .floating-heart{
    position:absolute;
    bottom:-8%;
    width:24px; height:24px;
    opacity:0;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.6));
    transform:scale(var(--scale));
    animation:floatHeart var(--dur) linear var(--delay) infinite;
    will-change:transform, opacity;
  }
  .floating-heart svg{ width:100%; height:100%; display:block; }
  @keyframes floatHeart{
    0%{ transform:translate(0,0) scale(var(--scale)) rotate(-6deg); opacity:0; }
    10%{ opacity:.85; }
    50%{ transform:translate(22px,-55vh) scale(var(--scale)) rotate(6deg); opacity:.85; }
    90%{ opacity:0; }
    100%{ transform:translate(-16px,-112vh) scale(var(--scale)) rotate(-4deg); opacity:0; }
  }

  /* ---------- CLICK EFFECTS ---------- */
  .click-layer{
    position:fixed; inset:0;
    z-index:50;
    pointer-events:none;
    overflow:hidden;
  }
  .click-fx{
    position:fixed;
    left:0; top:0;
    font-size:28px;
    animation:clickPop 1.4s ease-out forwards;
    will-change:transform, opacity;
  }
  @keyframes clickPop{
    0%{ transform:translate(-50%,-50%) scale(0) rotate(-10deg); opacity:0; }
    15%{ transform:translate(-50%,-50%) scale(1.25) rotate(5deg); opacity:1; }
    100%{ transform:translate(-50%, calc(-50% - 90px)) scale(.6) rotate(15deg); opacity:0; }
  }

  /* ---------- TEXT CONTENT ---------- */
  .content{
    position:relative;
    z-index:10;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 22px;
    gap:14px;
  }

  .title{
    font-family:'Snell Roundhand','Apple Chancery','Brush Script MT','Segoe Script',cursive;
    font-size:clamp(2.1rem, 9vw, 4.6rem);
    font-weight:400;
    color:#fff;
    margin:0;
    line-height:1.15;
    text-shadow:
      0 0 10px rgba(255,255,255,.85),
      0 0 25px rgba(255,170,221,.7),
      0 0 45px rgba(190,150,255,.5);
    opacity:0;
    transform:scale(.8) translateY(20px);
    animation:
      fadeZoom 1.4s ease-out .3s forwards,
      glowPulse 4s ease-in-out 1.8s infinite;
  }

  .heart-icon{
    display:inline-block;
    animation:heartBeat 1.6s ease-in-out infinite;
  }

  @keyframes heartBeat{
    0%,100%{ transform:scale(1); }
    25%{ transform:scale(1.18); }
    40%{ transform:scale(.95); }
    60%{ transform:scale(1.12); }
  }

  .subtitle{
    font-family:Georgia,'Times New Roman',serif;
    font-style:italic;
    letter-spacing:1px;
    font-size:clamp(.95rem, 2.8vw, 1.3rem);
    color:rgba(255,255,255,.92);
    margin:0;
    text-shadow:
      0 0 8px rgba(255,255,255,.6),
      0 0 18px rgba(216,180,255,.5);
    opacity:0;
    transform:scale(.9) translateY(15px);
    animation:fadeZoom 1.4s ease-out .9s forwards;
  }

  @keyframes fadeZoom{
    to{ opacity:1; transform:scale(1) translateY(0); }
  }

  @keyframes glowPulse{
    0%,100%{
      text-shadow:
        0 0 10px rgba(255,255,255,.85),
        0 0 25px rgba(255,170,221,.7),
        0 0 45px rgba(190,150,255,.5);
    }
    50%{
      text-shadow:
        0 0 16px rgba(255,255,255,1),
        0 0 38px rgba(255,170,221,.9),
        0 0 60px rgba(190,150,255,.7);
    }
  }

  /* ---------- MUSIC BUTTON ---------- */
  .music-btn{
    position:fixed;
    top:18px; right:18px;
    z-index:60;
    width:52px; height:52px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:linear-gradient(145deg, rgba(255,255,255,.55), rgba(255,255,255,.25));
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    box-shadow:0 4px 18px rgba(150,100,200,.35), inset 0 0 0 1px rgba(255,255,255,.5);
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .25s ease;
  }
  .music-btn:active{ transform:scale(.9); }
  .music-btn.playing{ animation:musicPulse 1.8s ease-in-out infinite; }
  @keyframes musicPulse{
    0%,100%{ box-shadow:0 4px 18px rgba(150,100,200,.35), inset 0 0 0 1px rgba(255,255,255,.5); }
    50%{ box-shadow:0 4px 28px rgba(255,170,221,.65), inset 0 0 0 1px rgba(255,255,255,.75); }
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:600px){
    .flower{ transform:scale(.78); }
    .floating-heart{ width:18px; height:18px; }
  }

  @media (max-height:560px){
    .content{ gap:8px; }
  }

  /* ---------- ACCESSIBILITY ---------- */
  @media (prefers-reduced-motion: reduce){
    body,
    .flower,
    .floating-heart,
    .mini-sparkle,
    .aurora::before,
    .aurora::after,
    .heart-icon,
    .flower-center,
    .music-btn.playing{
      animation:none !important;
    }
    .title{ animation:fadeZoom 1s ease-out forwards !important; }
    .subtitle{ animation:fadeZoom 1s ease-out forwards !important; }
  }
</style>
</head>
<body>

  <!--
    Untuk mengganti musik: letakkan file audio (misalnya "musik-romantis.mp3")
    di folder yang sama dengan file index.html ini, lalu ubah nilai src di bawah.
  -->
  <audio id="bgMusic" autoplay loop preload="auto">
    <source src="musik-romantis.mp3" type="audio/mpeg">
  </audio>

  <div class="aurora"></div>

  <div class="flowers-layer" id="flowersLayer">
    <div class="flower" style="--size:140px; --top:6%;  --left:6%;  --delay:0s;"   data-petals="6" data-color="pink"></div>
    <div class="flower" style="--size:110px; --top:9%;  --left:78%; --delay:.6s;"  data-petals="6" data-color="purple"></div>
    <div class="flower" style="--size:120px; --top:70%; --left:5%;  --delay:1.1s;" data-petals="5" data-color="blue"></div>
    <div class="flower" style="--size:150px; --top:73%; --left:78%; --delay:.3s;"  data-petals="7" data-color="peach"></div>
    <div class="flower" style="--size:230px; --top:38%; --left:38%; --delay:.9s; --op:.32;" data-petals="8" data-color="purple"></div>
    <div class="flower" style="--size:85px;  --top:17%; --left:46%; --delay:1.4s;" data-petals="6" data-color="blue"></div>
  </div>

  <div class="hearts-layer" id="heartsLayer"></div>
  <div class="click-layer" id="clickLayer"></div>

  <main class="content">
    <h1 class="title">I Love U Yolanda <span class="heart-icon">💕</span></h1>
    <p class="subtitle">Made with Love by Daniel Ganteng</p>
  </main>

  <button class="music-btn" id="musicBtn" aria-label="Putar atau hentikan musik" title="Putar musik romantis">🎵</button>

  <script>
    // ===== KONFIGURASI WARNA KELOPAK BUNGA =====
    const themes = {
      pink:   ['#ffd6ec', '#ff9ecb'],
      purple: ['#e6d6ff', '#c9a4ff'],
      blue:   ['#d6f0ff', '#9fd3ff'],
      peach:  ['#ffe6d6', '#ffc7a0']
    };

    // ===== BANGUN KELOPAK + PUTIK + SPARKLE UNTUK SETIAP BUNGA =====
    function buildFlower(flowerEl){
      const count = parseInt(flowerEl.dataset.petals, 10) || 6;
      const theme = themes[flowerEl.dataset.color] || themes.pink;

      for(let i = 0; i < count; i++){
        const angle = (360 / count) * i;
        const petal = document.createElement('div');
        petal.className = 'petal';
        petal.style.setProperty('--angle', angle + 'deg');
        petal.style.setProperty('--c1', theme[0]);
        petal.style.setProperty('--c2', theme[1]);
        petal.style.animationDelay = (i * 0.09) + 's';
        flowerEl.appendChild(petal);
      }

      const center = document.createElement('div');
      center.className = 'flower-center';
      flowerEl.appendChild(center);

      const sparkleCount = 3;
      for(let i = 0; i < sparkleCount; i++){
        const sp = document.createElement('div');
        sp.className = 'mini-sparkle';
        sp.style.top = (Math.random() * 80) + '%';
        sp.style.left = (Math.random() * 80) + '%';
        sp.style.animationDelay = (Math.random() * 2.5) + 's';
        flowerEl.appendChild(sp);
      }
    }

    document.querySelectorAll('.flower').forEach(buildFlower);

    // ===== PARTIKEL HATI MENGAMBANG =====
    const heartsLayer = document.getElementById('heartsLayer');
    const heartColors = ['#ff9ecb', '#d9b8ff', '#ffb3d1', '#c9a4ff', '#ffd6ec'];

    function createFloatingHeart(){
      const left = Math.random() * 100;
      const duration = 9 + Math.random() * 8;   // 9 - 17 detik
      const delay = Math.random() * 12;
      const scale = 0.45 + Math.random() * 0.85;
      const color = heartColors[Math.floor(Math.random() * heartColors.length)];

      const el = document.createElement('div');
      el.className = 'floating-heart';
      el.style.left = left + '%';
      el.style.setProperty('--dur', duration + 's');
      el.style.setProperty('--delay', delay + 's');
      el.style.setProperty('--scale', scale);
      el.innerHTML =
        '<svg viewBox="0 0 24 24"><path fill="' + color + '" ' +
        'd="M12 21s-8-4.6-8-11.2C4 6.2 6.2 4 9 4c1.7 0 3 .8 3.8 2.1' +
        'C13.6 4.8 14.9 4 16.6 4c2.8 0 5 2.2 5 5.8C21.6 16.4 12 21 12 21z"/></svg>';
      heartsLayer.appendChild(el);
    }

    for(let i = 0; i < 16; i++){ createFloatingHeart(); }

    // ===== EFEK SAAT LAYAR DIKLIK / DISENTUH =====
    const clickLayer = document.getElementById('clickLayer');
    const clickGlyphs = ['🌸', '🌷', '💮', '💕', '💖', '💗', '🌺'];

    function spawnClickFx(x, y){
      const glyph = clickGlyphs[Math.floor(Math.random() * clickGlyphs.length)];
      const el = document.createElement('div');
      el.className = 'click-fx';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.textContent = glyph;
      clickLayer.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }

    document.addEventListener('click', (e) => {
      if(e.target.closest('.music-btn')) return;
      spawnClickFx(e.clientX, e.clientY);
    });

    // ===== TOMBOL PLAY / PAUSE MUSIK =====
    const musicBtn = document.getElementById('musicBtn');
    const audio = document.getElementById('bgMusic');
    let isPlaying = false;

    musicBtn.addEventListener('click', () => {
      if(!isPlaying){
        audio.play().then(() => {
          isPlaying = true;
          musicBtn.textContent = '⏸';
          musicBtn.classList.add('playing');
        }).catch(() => {
          musicBtn.textContent = '🎵';
          alert('Belum ada file musik. Tambahkan file audio (misalnya "musik-romantis.mp3") di folder yang sama dengan file ini, lalu sesuaikan nama file pada tag <audio> di dalam index.html.');
        });
      } else {
        audio.pause();
        isPlaying = false;
        musicBtn.textContent = '🎵';
        musicBtn.classList.remove('playing');
      }
    });
  </script>

</body>
</html>
